<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #300000; 
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 0, 0, 0.8) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(75, 0, 0, 0.9) 0%, #1a0000 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px); 
            z-index: 1;
            pointer-events: none;
        }

        .header-font { 
            font-family: 'Cinzel', serif; 
            color: #FFD700; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.9);
        }
        
        .love-font { 
            font-family: 'Dancing Script', cursive; 
            color: #ffffff; 
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.9);
        }

        .slide-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            border-bottom: 2px solid rgba(139, 0, 0, 0.3);
            text-align: center;
            z-index: 2; 
        }

        .image-wrapper {
            width: 90%;
            max-width: 450px;
            border: 6px double #FFD700; 
            border-radius: 4px; 
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.95), 0 0 20px rgba(139, 0, 0, 0.4);
            position: relative;
            background: #000;
            transition: transform 0.5s ease;
        }
        
        .image-wrapper:hover { transform: scale(1.03); }
        .image-wrapper img { width: 100%; height: auto; display: block; }

        #music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FFD700;
            color: #4b0000;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: 0.3s;
        }
        #music-btn:hover { transform: scale(1.1); background: #fff; }

        /* ── GÖNDERDİĞİNİZ GÖRSELDEKİ GERÇEKÇİ SİYAH YARASALAR ── */
        .bat-container {
            position: fixed;
            width: 110px;  
            height: 70px;
            z-index: 4;
            pointer-events: none;
            left: -150px; 
            animation: flyAcross 7s infinite linear;
        }

        /* Fotoğraftaki keskin gotik yarasa hatları (SVG Path) */
        .bat-svg {
            width: 100%;
            height: 100%;
            fill: #0d0d0d; 
            filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.8));
            animation: flapWings 0.35s infinite ease-in-out alternate;
            transform-origin: center;
        }

        /* Gerçekçi kanat çırpış simülasyonu */
        @keyframes flapWings {
            0% { transform: scaleY(1.1) rotate(2deg); }
            100% { transform: scaleY(0.4) rotate(-5deg); } 
        }

        @keyframes flyAcross {
            0% { transform: translateX(0) translateY(0px); }
            50% { transform: translateX(calc(50vw + 75px)) translateY(-50px); }
            100% { transform: translateX(calc(100vw + 200px)) translateY(10px); }
        }

        /* KALPLER */
        .floating-heart {
            position: fixed;
            z-index: 5;
            color: #8b0000; 
            font-size: 24px;
            animation: moveHeart 4s infinite linear;
            display: none;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        @keyframes moveHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* SÜRÜKLENEBİLİR KİLİT ALANI */
        .climax-box {
            margin-top: 40px;
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 250px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .drag-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .key-icon { 
            font-size: 60px; 
            cursor: grab;
            transition: transform 0.2s;
            user-select: none;
            touch-action: none; 
        }
        .key-icon:active { cursor: grabbing; transform: scale(1.1); }

        .key-hint {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #FFD700;
            margin-top: 8px;
            letter-spacing: 1px;
            opacity: 0.8;
            pointer-events: none;
            text-shadow: 0 0 5px #000;
        }

        .lock-icon { 
            font-size: 100px; 
            color: #FFD700; 
            text-shadow: 0 0 20px rgba(0,0,0,0.8); 
            transition: 0.3s;
        }
        
        .final-heart { 
            font-size: 140px; 
            color: #8b0000; 
            position: absolute; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0); 
            transition: 1s cubic-bezier(.17,.67,.83,.67); 
            text-shadow: 0 0 40px #ff0000;
            z-index: 20;
        }
    </style>
</head>
